<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0050 海龜凱利自動導航儀</title>
    <!-- 引入 Tailwind CSS 實現科技感黑底風格 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- 主容器 -->
    <div class="max-w-xl w-full bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700">
        
        <!-- 標題 -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400 flex justify-center items-center gap-2">
                📊 0050 海龜凱利導航儀
            </h1>
            <p class="text-xs text-gray-400 mt-1">Vibe Coding 華強北 1.1 全連動版</p>
        </div>

        <!-- 區塊一：海龜策略訊號輸入 -->
        <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 mb-6">
            <h2 class="text-sm font-semibold text-blue-300 mb-4 flex items-center gap-1">🚨 今日海龜策略訊號</h2>
            
            <div class="space-y-3 text-sm">
                <div class="flex justify-between items-center">
                    <label class="text-gray-300">當前 0050 收盤價：</label>
                    <input type="number" id="currentPrice" value="160" step="0.1" class="w-28 bg-gray-700 border border-gray-600 rounded px-2 py-1 text-right text-white font-mono focus:outline-none focus:border-blue-500">
                </div>
                <div class="flex justify-between items-center">
                    <label class="text-gray-300">20日最高點 (突破買)：</label>
                    <input type="number" id="high20" value="158" step="0.1" class="w-28 bg-gray-700 border border-gray-600 rounded px-2 py-1 text-right text-white font-mono focus:outline-none focus:border-blue-500">
                </div>
                <div class="flex justify-between items-center">
                    <label class="text-gray-300">20日最低點 (跌破賣)：</label>
                    <input type="number" id="low20" value="145" step="0.1" class="w-28 bg-gray-700 border border-gray-600 rounded px-2 py-1 text-right text-white font-mono focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <!-- 決策燈號輸出 -->
            <div class="mt-4 pt-4 border-t border-gray-700 flex justify-between items-center">
                <span class="text-xs text-gray-400">【決策燈號】</span>
                <span id="signalBadge" class="px-3 py-1.5 rounded font-bold text-sm bg-green-950 text-green-400 border border-green-800">
                    📈 突破高點：多單進場 / 續抱
                </span>
            </div>
        </div>

        <!-- 區塊二：凱利公式與資金配位 -->
        <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
            <h2 class="text-sm font-semibold text-blue-300 mb-4 flex items-center gap-1">🧮 凱利公式配置計</h2>
            
            <div class="space-y-3 text-sm">
                <div class="flex justify-between items-center">
                    <label class="text-gray-300">總投資本金 (台幣)：</label>
                    <input type="number" id="totalCapital" value="1000000" class="w-36 bg-gray-700 border border-gray-600 rounded px-2 py-1 text-right text-white font-mono focus:outline-none focus:border-blue-500">
                </div>
                <div class="flex justify-between items-center text-gray-400 text-xs">
                    <span>海龜勝率 (預設)：</span>
                    <span class="font-mono">40%</span>
                </div>
                <div class="flex justify-between items-center text-gray-400 text-xs">
                    <span>賺賠比 (預設)：</span>
                    <span class="font-mono">2.5 倍</span>
                </div>
                
                <!-- 凱利比例顯示 -->
                <div class="pt-2 flex justify-between items-center border-t border-dashed border-gray-700">
                    <span class="text-gray-300">建議下單資金比率：</span>
                    <span id="kellyRatio" class="text-blue-400 font-bold font-mono">16.00%</span>
                </div>
                
                <!-- 終極建議下單金額（會隨訊號連動歸零） -->
                <div class="pt-2 flex justify-between items-center">
                    <span class="text-gray-200 font-medium">今日建議進金金額：</span>
                    <span id="suggestedAmount" class="text-xl font-black text-emerald-400 font-mono">$160,000</span>
                </div>
            </div>
        </div>

    </div>

    <!-- 核心計算與全連動邏輯晶片 -->
    <script>
        const currentPriceInput = document.getElementById('currentPrice');
        const high20Input = document.getElementById('high20');
        const low20Input = document.getElementById('low20');
        const totalCapitalInput = document.getElementById('totalCapital');
        
        const signalBadge = document.getElementById('signalBadge');
        const kellyRatioText = document.getElementById('kellyRatio');
        const suggestedAmountText = document.getElementById('suggestedAmount');

        const p = 0.4;
        const b = 2.5;
        const rawKelly = (b * p - (1 - p)) / b; 

        function calculateStrategy() {
            const currentPrice = parseFloat(currentPriceInput.value) || 0;
            const high20 = parseFloat(high20Input.value) || 0;
            const low20 = parseFloat(low20Input.value) || 0;
            const totalCapital = parseFloat(totalCapitalInput.value) || 0;

            let signal = 'hold'; 
            
            if (currentPrice >= high20) {
                signal = 'buy';
                signalBadge.textContent = '📈 突破高點：多單進場 / 續抱';
                signalBadge.className = 'px-3 py-1.5 rounded font-bold text-sm bg-green-950 text-green-400 border border-green-800';
            } else if (currentPrice <= low20) {
                signal = 'sell';
                signalBadge.textContent = '📉 跌破低點：空單進場 / 空倉';
                signalBadge.className = 'px-3 py-1.5 rounded font-bold text-sm bg-red-950 text-red-400 border border-red-800';
            } else {
                signal = 'hold';
                signalBadge.textContent = '⏳ 盤整區間：觀望不隨意加碼';
                signalBadge.className = 'px-3 py-1.5 rounded font-bold text-sm bg-gray-700 text-gray-300 border border-gray-600';
            }

            let finalRatio = 0;
            if (signal === 'buy') {
                finalRatio = rawKelly; 
                kellyRatioText.textContent = (rawKelly * 100).toFixed(2) + '%';
                kellyRatioText.className = "text-blue-400 font-bold font-mono";
            } else if (signal === 'sell') {
                finalRatio = 0;
                kellyRatioText.textContent = '0.00% (應空倉/空單)';
                kellyRatioText.className = "text-red-400 font-bold text-xs font-mono";
            } else {
                finalRatio = 0;
                kellyRatioText.textContent = '0.00% (區間觀望)';
                kellyRatioText.className = "text-gray-400 font-bold text-xs font-mono";
            }

            const finalAmount = totalCapital * finalRatio;
            suggestedAmountText.textContent = '$' + Math.round(finalAmount).toLocaleString();
            
            if (finalAmount > 0) {
                suggestedAmountText.className = "text-xl font-black text-emerald-400 font-mono";
            } else {
                suggestedAmountText.className = "text-xl font-black text-gray-500 font-mono";
            }
        }

        currentPriceInput.addEventListener('input', calculateStrategy);
        high20Input.addEventListener('input', calculateStrategy);
        low20Input.addEventListener('input', calculateStrategy);
        totalCapitalInput.addEventListener('input', calculateStrategy);

        calculateStrategy();
    </script>
</body>
</html>
